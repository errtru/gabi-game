<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Shadow -->
  <ellipse cx="64" cy="124" rx="38" ry="4" fill="#00000020"/>
  <!-- Body -->
  <ellipse cx="64" cy="88" rx="40" ry="30" fill="#A1784A" stroke="#6D4C41" stroke-width="2"/>
  <!-- Legs -->
  <rect x="22" y="108" width="18" height="20" rx="9" fill="#8D6E63"/>
  <rect x="48" y="112" width="16" height="18" rx="8" fill="#8D6E63"/>
  <rect x="64" y="112" width="16" height="18" rx="8" fill="#8D6E63"/>
  <rect x="88" y="108" width="18" height="20" rx="9" fill="#8D6E63"/>
  <!-- Tail wagging up -->
  <path d="M 102 96 Q 118 80 122 62" stroke="#A1784A" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M 102 96 Q 118 80 122 62" stroke="#6D4C41" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.3"/>
  <path d="M 102 96 Q 118 80 122 62" stroke="#A1784A" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Neck -->
  <rect x="46" y="52" width="36" height="28" rx="16" fill="#A1784A" stroke="#6D4C41" stroke-width="2"/>
  <!-- Head -->
  <ellipse cx="64" cy="40" rx="36" ry="30" fill="#A1784A" stroke="#6D4C41" stroke-width="2"/>
  <!-- Left ear (floppy down) -->
  <ellipse cx="30" cy="36" rx="12" ry="22" fill="#8D6E63" stroke="#6D4C41" stroke-width="2" transform="rotate(-20,30,36)"/>
  <!-- Right ear -->
  <ellipse cx="98" cy="36" rx="12" ry="22" fill="#8D6E63" stroke="#6D4C41" stroke-width="2" transform="rotate(20,98,36)"/>
  <!-- Muzzle -->
  <ellipse cx="64" cy="52" rx="22" ry="14" fill="#BCAAA4"/>
  <!-- Nose -->
  <ellipse cx="64" cy="46" rx="7" ry="5" fill="#4E342E"/>
  <!-- Nostrils -->
  <circle cx="60" cy="47" r="2" fill="#3E2723"/>
  <circle cx="68" cy="47" r="2" fill="#3E2723"/>
  <!-- Tongue out! -->
  <ellipse cx="64" cy="58" rx="10" ry="7" fill="#EF9A9A"/>
  <!-- Left eye -->
  <circle cx="44" cy="34" r="10" fill="white" stroke="#6D4C41" stroke-width="1.5"/>
  <circle cx="45" cy="34" r="6" fill="#4E342E"/>
  <circle cx="47" cy="32" r="2.5" fill="white"/>
  <!-- Right eye -->
  <circle cx="84" cy="34" r="10" fill="white" stroke="#6D4C41" stroke-width="1.5"/>
  <circle cx="85" cy="34" r="6" fill="#4E342E"/>
  <circle cx="87" cy="32" r="2.5" fill="white"/>
</svg>
