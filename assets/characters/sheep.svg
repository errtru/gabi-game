<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Shadow -->
  <ellipse cx="64" cy="124" rx="38" ry="4" fill="#00000020"/>
  <!-- Fluffy body (wool!) -->
  <circle cx="44" cy="86" r="22" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <circle cx="64" cy="80" r="24" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <circle cx="84" cy="86" r="22" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <circle cx="54" cy="96" r="20" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <circle cx="74" cy="96" r="20" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <!-- Legs (dark) -->
  <rect x="30" y="108" width="12" height="20" rx="6" fill="#5D4037"/>
  <rect x="50" y="110" width="12" height="18" rx="6" fill="#5D4037"/>
  <rect x="66" y="110" width="12" height="18" rx="6" fill="#5D4037"/>
  <rect x="86" y="108" width="12" height="20" rx="6" fill="#5D4037"/>
  <!-- Tail -->
  <path d="M 102 92 Q 116 88 114 76" stroke="#9E9E9E" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="114" cy="74" r="5" fill="white"/>
  <!-- Head (dark face - like black-face sheep) -->
  <ellipse cx="40" cy="48" rx="28" ry="26" fill="#4E342E" stroke="#3E2723" stroke-width="2"/>
  <!-- Fluffy wool cap on head -->
  <circle cx="28" cy="32" r="16" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <circle cx="44" cy="26" r="16" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <circle cx="58" cy="32" r="14" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <!-- Ears -->
  <ellipse cx="14" cy="48" rx="10" ry="14" fill="#4E342E" stroke="#3E2723" stroke-width="2"/>
  <ellipse cx="66" cy="48" rx="10" ry="14" fill="#4E342E" stroke="#3E2723" stroke-width="2"/>
  <!-- Muzzle -->
  <ellipse cx="40" cy="60" rx="18" ry="12" fill="#6D4C41"/>
  <!-- Nostrils -->
  <circle cx="34" cy="62" r="4" fill="#3E2723"/>
  <circle cx="46" cy="62" r="4" fill="#3E2723"/>
  <!-- Left eye -->
  <circle cx="26" cy="44" r="8" fill="white" stroke="#3E2723" stroke-width="1.5"/>
  <circle cx="27" cy="44" r="5" fill="#1a1a1a"/>
  <circle cx="29" cy="42" r="2" fill="white"/>
  <!-- Right eye -->
  <circle cx="54" cy="44" r="8" fill="white" stroke="#3E2723" stroke-width="1.5"/>
  <circle cx="55" cy="44" r="5" fill="#1a1a1a"/>
  <circle cx="57" cy="42" r="2" fill="white"/>
</svg>
