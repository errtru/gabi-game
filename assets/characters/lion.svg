<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Shadow -->
  <ellipse cx="64" cy="124" rx="38" ry="4" fill="#00000020"/>
  <!-- Body -->
  <ellipse cx="64" cy="90" rx="36" ry="26" fill="#F9A825" stroke="#F57F17" stroke-width="2"/>
  <!-- Legs -->
  <rect x="24" y="108" width="18" height="20" rx="9" fill="#F57F17"/>
  <rect x="46" y="112" width="16" height="18" rx="8" fill="#F57F17"/>
  <rect x="66" y="112" width="16" height="18" rx="8" fill="#F57F17"/>
  <rect x="86" y="108" width="18" height="20" rx="9" fill="#F57F17"/>
  <!-- Tail -->
  <path d="M 98 98 Q 118 94 120 112" stroke="#F57F17" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Mane (fluffy around head) -->
  <circle cx="36" cy="48" r="22" fill="#E65100"/>
  <circle cx="50" cy="30" r="22" fill="#E65100"/>
  <circle cx="70" cy="26" r="22" fill="#E65100"/>
  <circle cx="88" cy="34" r="22" fill="#E65100"/>
  <circle cx="98" cy="50" r="20" fill="#E65100"/>
  <!-- Inner mane -->
  <circle cx="46" cy="44" r="18" fill="#FF8F00"/>
  <circle cx="64" cy="36" r="18" fill="#FF8F00"/>
  <circle cx="82" cy="44" r="18" fill="#FF8F00"/>
  <!-- Head -->
  <ellipse cx="64" cy="50" rx="28" ry="26" fill="#F9A825" stroke="#F57F17" stroke-width="2"/>
  <!-- Left ear -->
  <polygon points="38,30 30,10 52,24" fill="#F9A825" stroke="#F57F17" stroke-width="2"/>
  <!-- Right ear -->
  <polygon points="90,30 98,10 76,24" fill="#F9A825" stroke="#F57F17" stroke-width="2"/>
  <!-- Left eye -->
  <circle cx="48" cy="44" r="9" fill="#A5D6A7" stroke="#F57F17" stroke-width="1.5"/>
  <circle cx="49" cy="44" r="5.5" fill="#1a1a1a"/>
  <circle cx="51" cy="42" r="2" fill="white"/>
  <!-- Right eye -->
  <circle cx="80" cy="44" r="9" fill="#A5D6A7" stroke="#F57F17" stroke-width="1.5"/>
  <circle cx="81" cy="44" r="5.5" fill="#1a1a1a"/>
  <circle cx="83" cy="42" r="2" fill="white"/>
  <!-- Nose -->
  <ellipse cx="64" cy="56" rx="7" ry="5" fill="#4E342E"/>
  <!-- Smile -->
  <path d="M 50 64 Q 64 74 78 64" stroke="#F57F17" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
