<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Shadow -->
  <ellipse cx="64" cy="124" rx="30" ry="4" fill="#00000020"/>
  <!-- Body -->
  <ellipse cx="72" cy="96" rx="32" ry="24" fill="white" stroke="#BDBDBD" stroke-width="2"/>
  <!-- Tail feathers -->
  <ellipse cx="104" cy="90" rx="10" ry="28" fill="white" stroke="#BDBDBD" stroke-width="1.5" transform="rotate(20,104,90)"/>
  <!-- Wing -->
  <ellipse cx="46" cy="88" rx="16" ry="10" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="1.5" transform="rotate(-15,46,88)"/>
  <!-- Neck (S-curve) -->
  <path d="M 60 78 Q 38 60 48 40 Q 54 24 64 20" stroke="white" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M 60 78 Q 38 60 48 40 Q 54 24 64 20" stroke="#BDBDBD" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M 60 78 Q 38 60 48 40 Q 54 24 64 20" stroke="white" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Head -->
  <ellipse cx="66" cy="18" rx="18" ry="14" fill="white" stroke="#BDBDBD" stroke-width="2"/>
  <!-- Beak -->
  <polygon points="48,16 66,12 66,20" fill="#FF8C00" stroke="#E65100" stroke-width="1.5"/>
  <!-- Eye -->
  <circle cx="76" cy="14" r="7" fill="white" stroke="#BDBDBD" stroke-width="1.5"/>
  <circle cx="77" cy="14" r="4" fill="#1a1a1a"/>
  <circle cx="78" cy="12" r="1.5" fill="white"/>
  <!-- Legs -->
  <rect x="58" y="112" width="8" height="14" rx="3" fill="#FF8C00"/>
  <rect x="74" y="112" width="8" height="14" rx="3" fill="#FF8C00"/>
  <ellipse cx="62" cy="126" rx="12" ry="4" fill="#FF8C00"/>
  <ellipse cx="78" cy="126" rx="12" ry="4" fill="#FF8C00"/>
</svg>
