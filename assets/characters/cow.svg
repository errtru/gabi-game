<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Shadow -->
  <ellipse cx="64" cy="124" rx="42" ry="4" fill="#00000020"/>
  <!-- Body -->
  <ellipse cx="64" cy="86" rx="48" ry="30" fill="#EFEBE9" stroke="#795548" stroke-width="2"/>
  <!-- Black spots -->
  <ellipse cx="30" cy="78" rx="12" ry="10" fill="#1a1a1a"/>
  <ellipse cx="56" cy="70" rx="10" ry="8" fill="#1a1a1a"/>
  <ellipse cx="82" cy="74" rx="11" ry="9" fill="#1a1a1a"/>
  <ellipse cx="104" cy="88" rx="9" ry="8" fill="#1a1a1a"/>
  <ellipse cx="40" cy="96" rx="8" ry="7" fill="#1a1a1a"/>
  <ellipse cx="70" cy="96" rx="9" ry="8" fill="#1a1a1a"/>
  <!-- Tail -->
  <path d="M 110 80 Q 122 68 120 52" stroke="#795548" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Udder -->
  <ellipse cx="64" cy="112" rx="16" ry="8" fill="#F8BBD9"/>
  <!-- Back legs -->
  <rect x="28" y="108" width="14" height="20" rx="7" fill="#8D6E63"/>
  <rect x="86" y="108" width="14" height="20" rx="7" fill="#8D6E63"/>
  <!-- Front legs -->
  <rect x="42" y="106" width="14" height="22" rx="7" fill="#8D6E63"/>
  <rect x="72" y="106" width="14" height="22" rx="7" fill="#8D6E63"/>
  <!-- Neck -->
  <rect x="36" y="42" width="36" height="36" rx="16" fill="#EFEBE9" stroke="#795548" stroke-width="2"/>
  <!-- Head -->
  <ellipse cx="54" cy="34" rx="36" ry="26" fill="#EFEBE9" stroke="#795548" stroke-width="2"/>
  <!-- Horns -->
  <path d="M 36 18 Q 28 6 20 10" stroke="#8D6E63" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 72 18 Q 80 6 88 10" stroke="#8D6E63" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Left ear (floppy) -->
  <ellipse cx="18" cy="28" rx="10" ry="16" fill="#EFEBE9" stroke="#795548" stroke-width="2"/>
  <!-- Right ear -->
  <ellipse cx="90" cy="28" rx="10" ry="16" fill="#EFEBE9" stroke="#795548" stroke-width="2"/>
  <!-- Muzzle -->
  <ellipse cx="54" cy="46" rx="22" ry="14" fill="#BCAAA4"/>
  <!-- Nostrils -->
  <ellipse cx="44" cy="48" rx="5" ry="4" fill="#8D6E63"/>
  <ellipse cx="64" cy="48" rx="5" ry="4" fill="#8D6E63"/>
  <!-- Eye left -->
  <circle cx="34" cy="28" r="9" fill="white" stroke="#795548" stroke-width="1.5"/>
  <circle cx="35" cy="28" r="5.5" fill="#1a1a1a"/>
  <circle cx="37" cy="26" r="2" fill="white"/>
  <!-- Eye right -->
  <circle cx="74" cy="28" r="9" fill="white" stroke="#795548" stroke-width="1.5"/>
  <circle cx="75" cy="28" r="5.5" fill="#1a1a1a"/>
  <circle cx="77" cy="26" r="2" fill="white"/>
</svg>
