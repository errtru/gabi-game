<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Shadow -->
  <ellipse cx="64" cy="124" rx="36" ry="4" fill="#00000020"/>
  <!-- Body -->
  <ellipse cx="64" cy="88" rx="36" ry="30" fill="#FF8F00" stroke="#E65100" stroke-width="2"/>
  <!-- Belly -->
  <ellipse cx="64" cy="90" rx="22" ry="18" fill="#FFF3E0"/>
  <!-- Tail -->
  <path d="M 90 100 Q 112 104 116 120 Q 100 114 96 122 Q 90 112 98 108" fill="#FF8F00" stroke="#E65100" stroke-width="1.5"/>
  <!-- Left arm/front leg -->
  <rect x="22" y="88" width="14" height="28" rx="7" fill="#FF8F00" stroke="#E65100" stroke-width="1.5"/>
  <!-- Right arm/front leg -->
  <rect x="92" y="88" width="14" height="28" rx="7" fill="#FF8F00" stroke="#E65100" stroke-width="1.5"/>
  <!-- Back legs -->
  <rect x="40" y="110" width="12" height="18" rx="6" fill="#FF8F00" stroke="#E65100" stroke-width="1.5"/>
  <rect x="76" y="110" width="12" height="18" rx="6" fill="#FF8F00" stroke="#E65100" stroke-width="1.5"/>
  <!-- Head -->
  <ellipse cx="64" cy="46" rx="32" ry="28" fill="#FF8F00" stroke="#E65100" stroke-width="2"/>
  <!-- Left ear (pointy) -->
  <polygon points="36,24 28,4 48,22" fill="#FF8F00" stroke="#E65100" stroke-width="2"/>
  <polygon points="38,22 32,10 46,20" fill="#FFCCBC"/>
  <!-- Right ear -->
  <polygon points="92,24 100,4 80,22" fill="#FF8F00" stroke="#E65100" stroke-width="2"/>
  <polygon points="90,22 96,10 82,20" fill="#FFCCBC"/>
  <!-- White muzzle -->
  <ellipse cx="64" cy="56" rx="20" ry="14" fill="#FFF3E0"/>
  <!-- Nose -->
  <ellipse cx="64" cy="52" rx="6" ry="4" fill="#FF7043"/>
  <!-- Whiskers -->
  <line x1="44" y1="54" x2="20" y2="50" stroke="#555" stroke-width="1.5"/>
  <line x1="44" y1="58" x2="20" y2="58" stroke="#555" stroke-width="1.5"/>
  <line x1="44" y1="62" x2="20" y2="66" stroke="#555" stroke-width="1.5"/>
  <line x1="84" y1="54" x2="108" y2="50" stroke="#555" stroke-width="1.5"/>
  <line x1="84" y1="58" x2="108" y2="58" stroke="#555" stroke-width="1.5"/>
  <line x1="84" y1="62" x2="108" y2="66" stroke="#555" stroke-width="1.5"/>
  <!-- Left eye -->
  <ellipse cx="48" cy="44" rx="10" ry="9" fill="#7DC8E0"/>
  <circle cx="50" cy="44" r="5.5" fill="#1a1a1a"/>
  <circle cx="52" cy="42" r="2" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="80" cy="44" rx="10" ry="9" fill="#7DC8E0"/>
  <circle cx="82" cy="44" r="5.5" fill="#1a1a1a"/>
  <circle cx="84" cy="42" r="2" fill="white"/>
  <!-- Smile -->
  <path d="M 50 64 Q 64 72 78 64" stroke="#E65100" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
