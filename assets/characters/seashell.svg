  <circle cx="17" cy="62" r="4" fill="#FFD600"/>
  <line x1="32" y1="74" x2="22" y2="58" stroke="#F9A825" stroke-width="2"/>
  <circle cx="21" cy="56" r="4" fill="#FFD600"/>
