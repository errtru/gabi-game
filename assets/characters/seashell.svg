<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Shadow -->
  <ellipse cx="64" cy="123" rx="30" ry="5" fill="#00000020"/>
  <!-- Shell spiral -->
  <ellipse cx="64" cy="72" rx="52" ry="46" fill="#FFF9C4" stroke="#F9A825" stroke-width="2"/>
  <ellipse cx="64" cy="72" rx="38" ry="34" fill="#FFF176" stroke="#F9A825" stroke-width="1.5"/>
  <ellipse cx="64" cy="72" rx="26" ry="22" fill="#FFEE58" stroke="#F9A825" stroke-width="1.5"/>
  <ellipse cx="64" cy="72" rx="14" ry="12" fill="#FFD600" stroke="#F9A825" stroke-width="1.5"/>
  <!-- Spiral line -->
  <path d="M 64 60 Q 78 64 78 72 Q 78 84 64 86 Q 48 84 46 72 Q 46 54 64 52" 
