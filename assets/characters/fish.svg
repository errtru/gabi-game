<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Shadow -->
  <ellipse cx="64" cy="122" rx="40" ry="5" fill="#00000020"/>
  <!-- Tail fin -->
  <polygon points="108,50 128,34 128,78 108,62" fill="#E8732A"/>
  <polygon points="108,50 128,34 128,78 108,62" fill="none" stroke="#C05A18" stroke-width="1.5"/>
  <!-- Body -->
  <ellipse cx="60" cy="56" rx="52" ry="34" fill="#F0892E"/>
  <ellipse cx="60" cy="56" rx="52" ry="34" fill="none" stroke="#C05A18" stroke-width="2"/>
  <!-- Belly -->
  <ellipse cx="55" cy="56" rx="32" ry="22" fill="#FFD580"/>
  <!-- Stripes -->
  <line x1="40" y1="34" x2="40" y2="78" stroke="#C05A18" stroke-width="2" opacity="0.4"/>
  <line x1="56" y1="32" x2="56" y2="80" stroke="#C05A18" stroke-width="2" opacity="0.4"/>
  <line x1="72" y1="33" x2="72" y2="79" stroke="#C05A18" stroke-width="2" opacity="0.4"/>
  <!-- Top fin -->
  <polygon points="30,22 44,22 36,42" fill="#E8732A" stroke="#C05A18" stroke-width="1.5"/>
  <!-- Bottom fin -->
  <polygon points="30,90 44,90 36,70" fill="#E8732A" stroke="#C05A18" stroke-width="1.5"/>
  <!-- Eye -->
  <circle cx="20" cy="50" r="10" fill="white" stroke="#C05A18" stroke-width="1.5"/>
  <circle cx="21" cy="50" r="6" fill="#1a1a1a"/>
  <circle cx="23" cy="48" r="2.5" fill="white"/>
  <!-- Mouth -->
  <path d="M 6 56 Q 14 62 6 68" stroke="#C05A18" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
