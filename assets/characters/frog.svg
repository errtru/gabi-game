<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Shadow -->
  <ellipse cx="64" cy="124" rx="36" ry="4" fill="#00000020"/>
  <!-- Body -->
  <ellipse cx="64" cy="90" rx="36" ry="28" fill="#4CAF50"/>
  <ellipse cx="64" cy="90" rx="36" ry="28" fill="none" stroke="#2E7D32" stroke-width="2"/>
  <!-- Belly -->
  <ellipse cx="64" cy="92" rx="24" ry="18" fill="#A5D6A7"/>
  <!-- Head -->
  <ellipse cx="64" cy="52" rx="34" ry="30" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
  <!-- Eye left bulge -->
  <ellipse cx="34" cy="36" rx="14" ry="12" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
  <!-- Eye right bulge -->
  <ellipse cx="94" cy="36" rx="14" ry="12" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
  <!-- Left eye -->
  <circle cx="34" cy="34" r="9" fill="#FFD700" stroke="#2E7D32" stroke-width="1.5"/>
  <circle cx="35" cy="34" r="5" fill="#1a1a1a"/>
  <circle cx="37" cy="32" r="2" fill="white"/>
  <!-- Right eye -->
  <circle cx="94" cy="34" r="9" fill="#FFD700" stroke="#2E7D32" stroke-width="1.5"/>
  <circle cx="95" cy="34" r="5" fill="#1a1a1a"/>
  <circle cx="97" cy="32" r="2" fill="white"/>
  <!-- Wide smile -->
  <path d="M 36 64 Q 64 82 92 64" stroke="#2E7D32" stroke-width="3" fill="#A5D6A7" stroke-linecap="round"/>
  <!-- Teeth -->
  <rect x="48" y="64" width="10" height="8" rx="2" fill="white"/>
  <rect x="62" y="64" width="10" height="8" rx="2" fill="white"/>
  <!-- Front legs -->
  <rect x="18" y="100" width="16" height="12" rx="6" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>
  <rect x="94" y="100" width="16" height="12" rx="6" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Back legs/feet -->
  <ellipse cx="44" cy="118" rx="14" ry="8" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>
  <ellipse cx="84" cy="118" rx="14" ry="8" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Toe lines -->
  <line x1="38" y1="118" x2="32" y2="124" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="44" y1="120" x2="44" y2="126" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="50" y1="118" x2="56" y2="124" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="78" y1="118" x2="72" y2="124" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="84" y1="120" x2="84" y2="126" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="90" y1="118" x2="96" y2="124" stroke="#2E7D32" stroke-width="1.5"/>
</svg>
