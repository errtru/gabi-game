<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Shadow -->
  <ellipse cx="64" cy="124" rx="30" ry="4" fill="#00000020"/>
  <!-- Body (black+white tuxedo) -->
  <ellipse cx="64" cy="88" rx="30" ry="32" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <!-- White belly -->
  <ellipse cx="64" cy="90" rx="18" ry="24" fill="white"/>
  <!-- Wings -->
  <ellipse cx="30" cy="82" rx="12" ry="24" fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
  <ellipse cx="98" cy="82" rx="12" ry="24" fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
  <!-- Neck -->
  <rect x="50" y="54" width="28" height="24" rx="12" fill="#1a1a1a"/>
  <!-- Head -->
  <ellipse cx="64" cy="42" rx="28" ry="26" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <!-- White face patch -->
  <ellipse cx="64" cy="46" rx="20" ry="18" fill="white"/>
  <!-- Beak -->
  <polygon points="52,52 76,52 64,64" fill="#FF8C00" stroke="#E65100" stroke-width="1.5"/>
  <!-- Left eye -->
  <circle cx="48" cy="36" r="9" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="49" cy="36" r="5.5" fill="#1a1a1a"/>
  <circle cx="51" cy="34" r="2" fill="white"/>
  <!-- Right eye -->
  <circle cx="80" cy="36" r="9" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="81" cy="36" r="5.5" fill="#1a1a1a"/>
  <circle cx="83" cy="34" r="2" fill="white"/>
  <!-- Feet -->
  <rect x="48" y="116" width="12" height="12" rx="4" fill="#FF8C00"/>
  <rect x="68" y="116" width="12" height="12" rx="4" fill="#FF8C00"/>
  <ellipse cx="54" cy="126" rx="14" ry="4" fill="#FF8C00"/>
  <ellipse cx="74" cy="126" rx="14" ry="4" fill="#FF8C00"/>
</svg>
