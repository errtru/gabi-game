<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Shadow -->
  <ellipse cx="64" cy="123" rx="38" ry="5" fill="#00000020"/>
  <!-- Body -->
  <ellipse cx="64" cy="88" rx="42" ry="32" fill="#F5D800"/>
  <ellipse cx="64" cy="88" rx="42" ry="32" fill="none" stroke="#C8A800" stroke-width="2"/>
  <!-- Wing left -->
  <ellipse cx="22" cy="82" rx="14" ry="22" fill="#E8CC00" transform="rotate(-20,22,82)"/>
  <ellipse cx="22" cy="82" rx="14" ry="22" fill="none" stroke="#C8A800" stroke-width="1.5" transform="rotate(-20,22,82)"/>
  <!-- Wing right -->
  <ellipse cx="106" cy="82" rx="14" ry="22" fill="#E8CC00" transform="rotate(20,106,82)"/>
  <ellipse cx="106" cy="82" rx="14" ry="22" fill="none" stroke="#C8A800" stroke-width="1.5" transform="rotate(20,106,82)"/>
  <!-- Neck -->
  <rect x="50" y="45" width="28" height="30" rx="14" fill="#F5D800" stroke="#C8A800" stroke-width="2"/>
  <!-- Head -->
  <ellipse cx="64" cy="38" rx="26" ry="24" fill="#F5D800" stroke="#C8A800" stroke-width="2"/>
  <!-- Beak top -->
  <polygon points="38,34 54,30 54,38" fill="#FF8C00" stroke="#CC6600" stroke-width="1.5"/>
  <!-- Beak bottom -->
  <polygon points="38,40 54,36 54,44" fill="#FF7000" stroke="#CC6600" stroke-width="1.5"/>
  <!-- Eye -->
  <circle cx="72" cy="32" r="8" fill="white" stroke="#C8A800" stroke-width="1.5"/>
  <circle cx="73" cy="32" r="5" fill="#1a1a1a"/>
  <circle cx="75" cy="30" r="2" fill="white"/>
  <!-- Tail feathers -->
  <ellipse cx="106" cy="96" rx="8" ry="22" fill="#E8CC00" transform="rotate(15,106,96)"/>
  <ellipse cx="116" cy="92" rx="6" ry="18" fill="#F5D800" transform="rotate(25,116,92)"/>
  <!-- Legs -->
  <rect x="48" y="114" width="8" height="14" rx="3" fill="#FF8C00"/>
  <rect x="72" y="114" width="8" height="14" rx="3" fill="#FF8C00"/>
  <!-- Feet -->
  <ellipse cx="52" cy="126" rx="10" ry="4" fill="#FF8C00"/>
  <ellipse cx="76" cy="126" rx="10" ry="4" fill="#FF8C00"/>
</svg>
