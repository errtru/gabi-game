<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Shadow -->
  <ellipse cx="64" cy="124" rx="36" ry="4" fill="#00000020"/>
  <!-- Body -->
  <ellipse cx="64" cy="88" rx="40" ry="28" fill="#6D4C41" stroke="#4E342E" stroke-width="2"/>
  <!-- Belly -->
  <ellipse cx="64" cy="90" rx="26" ry="18" fill="#A1784A"/>
  <!-- Legs -->
  <rect x="22" y="106" width="18" height="22" rx="9" fill="#5D4037"/>
  <rect x="46" y="110" width="16" height="20" rx="8" fill="#5D4037"/>
  <rect x="66" y="110" width="16" height="20" rx="8" fill="#5D4037"/>
  <rect x="88" y="106" width="18" height="22" rx="9" fill="#5D4037"/>
  <!-- Head -->
  <ellipse cx="64" cy="44" rx="36" ry="32" fill="#6D4C41" stroke="#4E342E" stroke-width="2"/>
  <!-- Left ear (round) -->
  <circle cx="34" cy="20" r="14" fill="#6D4C41" stroke="#4E342E" stroke-width="2"/>
  <circle cx="34" cy="20" r="9" fill="#A1784A"/>
  <!-- Right ear (round) -->
  <circle cx="94" cy="20" r="14" fill="#6D4C41" stroke="#4E342E" stroke-width="2"/>
  <circle cx="94" cy="20" r="9" fill="#A1784A"/>
  <!-- Muzzle -->
  <ellipse cx="64" cy="56" rx="20" ry="14" fill="#A1784A"/>
  <!-- Nose -->
  <ellipse cx="64" cy="50" rx="6" ry="4" fill="#4E342E"/>
  <!-- Left eye -->
  <circle cx="46" cy="36" r="10" fill="#4E342E" stroke="#4E342E" stroke-width="1.5"/>
  <circle cx="48" cy="36" r="6" fill="#1a1a1a"/>
  <circle cx="50" cy="34" r="2.5" fill="white"/>
  <!-- Right eye -->
  <circle cx="82" cy="36" r="10" fill="#4E342E" stroke="#4E342E" stroke-width="1.5"/>
  <circle cx="84" cy="36" r="6" fill="#1a1a1a"/>
  <circle cx="86" cy="34" r="2.5" fill="white"/>
  <!-- Smile -->
  <path d="M 48 62 Q 64 72 80 62" stroke="#4E342E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
