<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Shadow -->
  <ellipse cx="64" cy="124" rx="32" ry="4" fill="#00000020"/>
  <!-- Body (fluffy) -->
  <ellipse cx="64" cy="90" rx="30" ry="32" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="2"/>
  <!-- Belly -->
  <ellipse cx="64" cy="94" rx="18" ry="20" fill="#FFF9C4"/>
  <!-- Tail -->
  <ellipse cx="94" cy="88" rx="12" ry="8" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="1.5" transform="rotate(-20,94,88)"/>
  <!-- Legs -->
  <rect x="36" y="112" width="14" height="16" rx="7" fill="#E0E0E0"/>
  <rect x="78" y="112" width="14" height="16" rx="7" fill="#E0E0E0"/>
  <!-- Head -->
  <ellipse cx="64" cy="44" rx="30" ry="28" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="2"/>
  <!-- Left ear (very long!) -->
  <ellipse cx="40" cy="10" rx="10" ry="28" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="2"/>
  <ellipse cx="40" cy="10" rx="6" ry="22" fill="#FFAB91"/>
  <!-- Right ear (very long!) -->
  <ellipse cx="88" cy="10" rx="10" ry="28" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="2"/>
  <ellipse cx="88" cy="10" rx="6" ry="22" fill="#FFAB91"/>
  <!-- Left eye -->
  <circle cx="48" cy="40" r="9" fill="#E0F7FA" stroke="#BDBDBD" stroke-width="1.5"/>
  <circle cx="49" cy="40" r="5.5" fill="#4E342E"/>
  <circle cx="51" cy="38" r="2" fill="white"/>
  <!-- Right eye -->
  <circle cx="80" cy="40" r="9" fill="#E0F7FA" stroke="#BDBDBD" stroke-width="1.5"/>
  <circle cx="81" cy="40" r="5.5" fill="#4E342E"/>
  <circle cx="83" cy="38" r="2" fill="white"/>
  <!-- Nose -->
  <ellipse cx="64" cy="54" rx="7" ry="5" fill="#EF9A9A" stroke="#E57373" stroke-width="1.5"/>
  <!-- Whisker lines -->
  <line x1="44" y1="56" x2="22" y2="52" stroke="#BDBDBD" stroke-width="1.5"/>
  <line x1="44" y1="60" x2="22" y2="60" stroke="#BDBDBD" stroke-width="1.5"/>
  <line x1="84" y1="56" x2="106" y2="52" stroke="#BDBDBD" stroke-width="1.5"/>
  <line x1="84" y1="60" x2="106" y2="60" stroke="#BDBDBD" stroke-width="1.5"/>
  <!-- Mouth -->
  <path d="M 54 62 Q 64 68 74 62" stroke="#BDBDBD" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Fluffy cheeks -->
  <circle cx="36" cy="52" r="10" fill="#FFCDD2" opacity="0.5"/>
  <circle cx="92" cy="52" r="10" fill="#FFCDD2" opacity="0.5"/>
</svg>
