<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Shadow -->
  <ellipse cx="64" cy="124" rx="36" ry="4" fill="#00000020"/>
  <!-- Body -->
  <ellipse cx="64" cy="88" rx="40" ry="28" fill="white" stroke="#424242" stroke-width="2"/>
  <!-- Black patches on body -->
  <ellipse cx="30" cy="82" rx="18" ry="14" fill="#212121"/>
  <ellipse cx="100" cy="80" rx="16" ry="14" fill="#212121"/>
  <ellipse cx="64" cy="104" rx="22" ry="14" fill="#212121"/>
  <!-- Belly (white) -->
  <ellipse cx="64" cy="88" rx="22" ry="16" fill="white"/>
  <!-- Legs -->
  <rect x="22" y="106" width="18" height="22" rx="9" fill="#212121"/>
  <rect x="88" y="106" width="18" height="22" rx="9" fill="#212121"/>
  <!-- Head -->
  <ellipse cx="64" cy="44" rx="36" ry="32" fill="white" stroke="#424242" stroke-width="2"/>
  <!-- Left ear -->
  <circle cx="34" cy="18" r="14" fill="white" stroke="#424242" stroke-width="2"/>
  <circle cx="34" cy="18" r="9" fill="#424242"/>
  <!-- Right ear -->
  <circle cx="94" cy="18" r="14" fill="white" stroke="#424242" stroke-width="2"/>
  <circle cx="94" cy="18" r="9" fill="#424242"/>
  <!-- Left eye patch -->
  <ellipse cx="46" cy="36" rx="16" ry="14" fill="#212121"/>
  <!-- Right eye patch -->
  <ellipse cx="82" cy="36" rx="16" ry="14" fill="#212121"/>
  <!-- Left eye -->
  <circle cx="46" cy="36" r="9" fill="white"/>
  <circle cx="47" cy="36" r="5.5" fill="#1a1a1a"/>
  <circle cx="49" cy="34" r="2" fill="white"/>
  <!-- Right eye -->
  <circle cx="82" cy="36" r="9" fill="white"/>
  <circle cx="83" cy="36" r="5.5" fill="#1a1a1a"/>
  <circle cx="85" cy="34" r="2" fill="white"/>
  <!-- Muzzle -->
  <ellipse cx="64" cy="56" rx="18" ry="13" fill="#BDBDBD"/>
  <!-- Nose -->
  <ellipse cx="64" cy="52" rx="5" ry="3.5" fill="#212121"/>
  <!-- Smile -->
  <path d="M 50 62 Q 64 70 78 62" stroke="#424242" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
