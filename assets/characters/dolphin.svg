<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Tail -->
  <ellipse cx="108" cy="52" rx="20" ry="10" fill="#4DD0E1" transform="rotate(30,108,52)" stroke="#00ACC1" stroke-width="1.5"/>
  <ellipse cx="116" cy="70" rx="20" ry="10" fill="#4DD0E1" transform="rotate(-30,116,70)" stroke="#00ACC1" stroke-width="1.5"/>
  <!-- Body -->
  <ellipse cx="56" cy="64" rx="52" ry="30" fill="#00BCD4" stroke="#00838F" stroke-width="2"/>
  <!-- Belly -->
  <ellipse cx="48" cy="66" rx="36" ry="18" fill="#E0F7FA"/>
  <!-- Dorsal fin -->
  <polygon points="40,34 58,34 50,54" fill="#00ACC1" stroke="#00838F" stroke-width="1.5"/>
  <!-- Flippers -->
  <ellipse cx="24" cy="80" rx="16" ry="8" fill="#00ACC1" transform="rotate(30,24,80)" stroke="#00838F" stroke-width="1.5"/>
  <!-- Smile (dolphins always smile!) -->
  <path d="M 8 62 Q 16 72 8 82" stroke="#00838F" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Snout -->
  <rect x="2" y="54" width="26" height="18" rx="9" fill="#00BCD4" stroke="#00838F" stroke-width="1.5"/>
  <!-- Nostril/blowhole dot (top) -->
  <ellipse cx="44" cy="36" rx="5" ry="3" fill="#00838F"/>
  <!-- Eye -->
  <circle cx="20" cy="56" r="8" fill="white" stroke="#00838F" stroke-width="1.5"/>
  <circle cx="21" cy="56" r="5" fill="#1a1a1a"/>
  <circle cx="23" cy="54" r="2" fill="white"/>
</svg>
