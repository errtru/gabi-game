<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Shadow -->
  <ellipse cx="56" cy="124" rx="34" ry="4" fill="#00000020"/>
  <!-- Body -->
  <ellipse cx="56" cy="88" rx="30" ry="28" fill="#8D6E63" stroke="#5D4037" stroke-width="2"/>
  <!-- Back legs (longer) -->
  <rect x="30" y="106" width="12" height="22" rx="6" fill="#795548"/>
  <rect x="70" y="106" width="12" height="22" rx="6" fill="#795548"/>
  <!-- Hooves -->
  <ellipse cx="36" cy="127" rx="8" ry="4" fill="#4E342E"/>
  <ellipse cx="76" cy="127" rx="8" ry="4" fill="#4E342E"/>
  <!-- Neck (angled, graceful) -->
  <path d="M 50 64 Q 40 42 44 22" stroke="#8D6E63" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M 50 64 Q 40 42 44 22" stroke="#5D4037" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.3"/>
  <path d="M 50 64 Q 40 42 44 22" stroke="#8D6E63" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- White throat -->
  <path d="M 52 64 Q 44 44 46 24" stroke="#D7CCC8" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Head -->
  <ellipse cx="50" cy="16" rx="18" ry="14" fill="#8D6E63" stroke="#5D4037" stroke-width="2"/>
  <!-- Antlers! -->
  <path d="M 38 8 Q 28 -2 20 2" stroke="#5D4037" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 30 6 Q 22 12 16 8" stroke="#5D4037" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 38 8 Q 34 -4 28 -2" stroke="#5D4037" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 62 8 Q 72 -2 80 2" stroke="#5D4037" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 70 6 Q 78 12 84 8" stroke="#5D4037" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 62 8 Q 66 -4 72 -2" stroke="#5D4037" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Eye -->
  <circle cx="58" cy="12" r="8" fill="white" stroke="#5D4037" stroke-width="1.5"/>
  <circle cx="59" cy="12" r="5" fill="#1a1a1a"/>
  <circle cx="61" cy="10" r="2" fill="white"/>
  <!-- Nose -->
  <ellipse cx="42" cy="18" rx="6" ry="4" fill="#5D4037"/>
  <!-- Front legs -->
  <rect x="38" y="98" width="10" height="26" rx="5" fill="#795548"/>
  <rect x="60" y="98" width="10" height="26" rx="5" fill="#795548"/>
  <!-- Tail -->
  <ellipse cx="84" cy="85" rx="6" ry="8" fill="#D7CCC8"/>
  <!-- White rump -->
  <ellipse cx="84" cy="88" rx="12" ry="10" fill="#EFEBE9"/>
</svg>
