<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 720" width="3840" height="720">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#B0E0FF"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#29B6F6"/>
      <stop offset="100%" stop-color="#0277BD"/>
    </linearGradient>
    <pattern id="tiles" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="#E0F7FA"/>
      <rect x="1" y="1" width="78" height="78" fill="#B2EBF2" rx="2"/>
      <rect x="4" y="4" width="72" height="72" fill="#E0F7FA" rx="1"/>
    </pattern>
    <pattern id="waves" x="0" y="0" width="200" height="40" patternUnits="userSpaceOnUse">
      <path d="M0 20 Q50 0 100 20 Q150 40 200 20" stroke="white" stroke-width="3" fill="none" opacity="0.4"/>
    </pattern>
  </defs>
  
  <!-- Sky -->
  <rect width="3840" height="300" fill="url(#skyGrad)"/>
  
  <!-- Sun -->
  <circle cx="180" cy="90" r="70" fill="#FFD600" opacity="0.9"/>
  <circle cx="180" cy="90" r="55" fill="#FFEE58"/>
  <!-- Sun rays -->
  <line x1="180" y1="4" x2="180" y2="-10" stroke="#FFD600" stroke-width="6" stroke-linecap="round"/>
  <line x1="230" y1="24" x2="244" y2="14" stroke="#FFD600" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="90" x2="272" y2="90" stroke="#FFD600" stroke-width="6" stroke-linecap="round"/>
  <line x1="230" y1="156" x2="244" y2="166" stroke="#FFD600" stroke-width="6" stroke-linecap="round"/>
  <line x1="130" y1="24" x2="116" y2="14" stroke="#FFD600" stroke-width="6" stroke-linecap="round"/>
  <line x1="104" y1="90" x2="88" y2="90" stroke="#FFD600" stroke-width="6" stroke-linecap="round"/>
  <line x1="130" y1="156" x2="116" y2="166" stroke="#FFD600" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Clouds -->
  <g opacity="0.92">
    <circle cx="400" cy="80" r="50" fill="white"/>
    <circle cx="450" cy="60" r="60" fill="white"/>
    <circle cx="510" cy="72" r="50" fill="white"/>
    <circle cx="560" cy="80" r="42" fill="white"/>
  </g>
  <g opacity="0.88">
    <circle cx="900" cy="60" r="44" fill="white"/>
    <circle cx="948" cy="44" r="54" fill="white"/>
    <circle cx="1004" cy="56" r="44" fill="white"/>
    <circle cx="1050" cy="64" r="36" fill="white"/>
  </g>
  <g opacity="0.9">
    <circle cx="1500" cy="90" r="48" fill="white"/>
    <circle cx="1554" cy="68" r="58" fill="white"/>
    <circle cx="1616" cy="80" r="48" fill="white"/>
    <circle cx="1664" cy="90" r="40" fill="white"/>
  </g>
  <g opacity="0.85">
    <circle cx="2100" cy="70" r="50" fill="white"/>
    <circle cx="2154" cy="50" r="60" fill="white"/>
    <circle cx="2216" cy="62" r="50" fill="white"/>
  </g>
  <g opacity="0.9">
    <circle cx="2700" cy="80" r="46" fill="white"/>
    <circle cx="2750" cy="58" r="56" fill="white"/>
    <circle cx="2810" cy="70" r="46" fill="white"/>
    <circle cx="2858" cy="80" r="38" fill="white"/>
  </g>
  <g opacity="0.87">
    <circle cx="3300" cy="72" r="44" fill="white"/>
    <circle cx="3350" cy="52" r="54" fill="white"/>
    <circle cx="3408" cy="64" r="44" fill="white"/>
    <circle cx="3454" cy="74" r="36" fill="white"/>
  </g>
  
  <!-- Pool edge top -->
  <rect y="285" width="3840" height="40" fill="#4DD0E1" rx="8"/>
  
  <!-- Water -->
  <rect y="320" width="3840" height="320" fill="url(#waterGrad)"/>
  <rect y="320" width="3840" height="320" fill="url(#waves)"/>
  <!-- Water shimmers -->
  <ellipse cx="300" cy="380" rx="60" ry="10" fill="white" opacity="0.15"/>
  <ellipse cx="700" cy="420" rx="80" ry="12" fill="white" opacity="0.12"/>
  <ellipse cx="1100" cy="360" rx="70" ry="10" fill="white" opacity="0.15"/>
  <ellipse cx="1500" cy="400" rx="90" ry="12" fill="white" opacity="0.10"/>
  <ellipse cx="1900" cy="370" rx="75" ry="11" fill="white" opacity="0.14"/>
  <ellipse cx="2300" cy="410" rx="85" ry="12" fill="white" opacity="0.12"/>
  <ellipse cx="2700" cy="380" rx="70" ry="10" fill="white" opacity="0.15"/>
  <ellipse cx="3100" cy="420" rx="80" ry="12" fill="white" opacity="0.11"/>
  <ellipse cx="3500" cy="390" rx="60" ry="10" fill="white" opacity="0.13"/>
  
  <!-- Pool bottom (tiles) -->
  <rect y="640" width="3840" height="80" fill="url(#tiles)"/>
  
  <!-- Diving board (left) -->
  <rect x="80" y="240" width="160" height="20" rx="8" fill="#FF7043"/>
  <rect x="80" y="240" width="16" height="80" rx="6" fill="#BF360C"/>
  
  <!-- Diving board (right of center) -->
  <rect x="1980" y="230" width="160" height="20" rx="8" fill="#FF7043"/>
  <rect x="2134" y="230" width="16" height="90" rx="6" fill="#BF360C"/>
  
  <!-- Inflatable rings in water -->
  <ellipse cx="500" cy="440" rx="50" ry="20" fill="none" stroke="#FF5252" stroke-width="18"/>
  <ellipse cx="500" cy="440" rx="50" ry="20" fill="none" stroke="white" stroke-width="8" stroke-dasharray="30 30"/>
  
  <ellipse cx="1200" cy="480" rx="50" ry="20" fill="none" stroke="#FFEB3B" stroke-width="18"/>
  <ellipse cx="1200" cy="480" rx="50" ry="20" fill="none" stroke="white" stroke-width="8" stroke-dasharray="30 30"/>
  
  <ellipse cx="2400" cy="460" rx="50" ry="20" fill="none" stroke="#66BB6A" stroke-width="18"/>
  <ellipse cx="2400" cy="460" rx="50" ry="20" fill="none" stroke="white" stroke-width="8" stroke-dasharray="30 30"/>
  
  <ellipse cx="3200" cy="450" rx="50" ry="20" fill="none" stroke="#AB47BC" stroke-width="18"/>
  <ellipse cx="3200" cy="450" rx="50" ry="20" fill="none" stroke="white" stroke-width="8" stroke-dasharray="30 30"/>
  
  <!-- Beach balls -->
  <circle cx="820" cy="395" r="36" fill="#FF5252"/>
  <path d="M 784 395 Q 820 370 856 395" fill="#FFEB3B"/>
  <path d="M 784 395 Q 820 420 856 395" fill="#42A5F5"/>
  
  <circle cx="1800" cy="410" r="36" fill="#66BB6A"/>
  <path d="M 1764 410 Q 1800 385 1836 410" fill="#FFEB3B"/>
  <path d="M 1764 410 Q 1800 435 1836 410" fill="#FF5252"/>
  
  <circle cx="3000" cy="430" r="36" fill="#AB47BC"/>
  <path d="M 2964 430 Q 3000 405 3036 430" fill="white"/>
  <path d="M 2964 430 Q 3000 455 3036 430" fill="#FF8A65"/>
  
  <!-- Umbrellas at pool edge -->
  <polygon points="640,180 740,300 540,300" fill="#FF8A65" stroke="#E64A19" stroke-width="2"/>
  <rect x="635" y="180" width="10" height="140" fill="#BF360C"/>
  
  <polygon points="1340,160 1440,280 1240,280" fill="#42A5F5" stroke="#1565C0" stroke-width="2"/>
  <rect x="1335" y="160" width="10" height="140" fill="#1565C0"/>
  
  <polygon points="2040,170 2140,290 1940,290" fill="#FFEB3B" stroke="#F57F17" stroke-width="2"/>
  <rect x="2035" y="170" width="10" height="140" fill="#F57F17"/>
  
  <polygon points="2740,165 2840,285 2640,285" fill="#EC407A" stroke="#880E4F" stroke-width="2"/>
  <rect x="2735" y="165" width="10" height="140" fill="#880E4F"/>
  
  <polygon points="3440,175 3540,295 3340,295" fill="#66BB6A" stroke="#1B5E20" stroke-width="2"/>
  <rect x="3435" y="175" width="10" height="140" fill="#1B5E20"/>
  
  <!-- Pool edge bottom -->
  <rect y="636" width="3840" height="8" fill="#4DD0E1"/>
  <rect y="0" width="3840" height="8" fill="#4DD0E1"/>
</svg>
