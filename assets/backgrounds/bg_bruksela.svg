    <circle cx="38" cy="12" r="3"/>
    <circle cx="42" cy="25" r="3"/>
    <circle cx="38" cy="29" r="3"/>
    <circle cx="25" cy="32" r="3"/>
    <circle cx="12" cy="29" r="3"/>
    <circle cx="8" cy="25" r="3"/>
    <circle cx="12" cy="12" r="3"/>
  </g>

  <!-- Pigeons on street -->
  <g fill="#9E9E9E">
    <ellipse cx="500" cy="600" rx="18" ry="10"/>
