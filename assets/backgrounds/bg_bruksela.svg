      <circle cx="9" cy="-15.6" r="4"/>
      <circle cx="15.6" cy="-9" r="4"/>
      <circle cx="18" cy="0" r="4"/>
      <circle cx="15.6" cy="9" r="4"/>
      <circle cx="9" cy="15.6" r="4"/>
      <circle cx="0" cy="18" r="4"/>
      <circle cx="-9" cy="15.6" r="4"/>
      <circle cx="-15.6" cy="9" r="4"/>
      <circle cx="-18" cy="0" r="4"/>
      <circle cx="-15.6" cy="-9" r="4"/>
      <circle cx="-9" cy="-15.6" r="4"/>
