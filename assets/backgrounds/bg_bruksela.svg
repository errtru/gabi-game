  <!-- Street shadow under buildings -->
  <rect y="555" width="3840" height="14" fill="#757575" opacity="0.5"/>
  
  <!-- Street lamps with period-style iron posts -->
  <g fill="#424242">
    <!-- Lamp 1 -->
    <rect x="475" y="400" width="12" height="165" rx="6"/>
    <ellipse cx="481" cy="398" rx="40" ry="12" fill="#616161"/>
    <circle cx="481" cy="382" r="20" fill="#FFF9C4"/>
    <circle cx="481" cy="382" r="14" fill="#FFD600" opacity="0.8"/>
    <!-- Lamp 2 -->
    <rect x="1070" y="400" width="12" height="165" rx="6"/>
    <ellipse cx="1076" cy="398" rx="40" ry="12" fill="#616161"/>
    <circle cx="1076" cy="382" r="20" fill="#FFF9C4"/>
    <circle cx="1076" cy="382" r="14" fill="#FFD600" opacity="0.8"/>
    <!-- Lamp 3 -->
