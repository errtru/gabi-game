    <rect x="80" y="20" width="24" height="410" rx="12" fill="#B8960C"/>
    <rect x="130" y="20" width="24" height="410" rx="12" fill="#B8960C"/>
    <rect x="180" y="20" width="24" height="410" rx="12" fill="#B8960C"/>
    <rect x="230" y="20" width="24" height="410" rx="12" fill="#B8960C"/>
    <rect x="280" y="20" width="24" height="410" rx="12" fill="#B8960C"/>
    <!-- Windows - 3 floors -->
