    <rect x="40" y="-36" width="280" height="24" fill="#C9A84C"/>
    <!-- Columns -->
    <rect x="40" y="15" width="22" height="350" rx="11" fill="#C9A84C"/>
    <rect x="114" y="15" width="22" height="235" rx="11" fill="#C9A84C"/>
    <rect x="224" y="15" width="22" height="235" rx="11" fill="#C9A84C"/>
    <rect x="298" y="15" width="22" height="350" rx="11" fill="#C9A84C"/>
    <!-- Central tower -->
