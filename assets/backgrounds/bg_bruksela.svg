      <path d="M110,180 Q110,140 140,140 Q170,140 170,180 L170,250 Q170,260 160,260 L120,260 Q110,260 110,250 Z" fill="#B3E5FC"/>
      <path d="M190,180 Q190,140 220,140 Q250,140 250,180 L250,250 Q250,260 240,260 L200,260 Q190,260 190,250 Z" fill="#B3E5FC"/>
    </g>
    <!-- Door -->
