      <path d="M110,60 Q110,20 140,20 Q170,20 170,60 L170,130 Q170,140 160,140 L120,140 Q110,140 110,130 Z"/>
      <path d="M190,60 Q190,20 220,20 Q250,20 250,60 L250,130 Q250,140 240,140 L200,140 Q190,140 190,130 Z"/>
      <!-- Second floor -->
