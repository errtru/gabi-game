    <rect x="6" y="0" width="48" height="120" fill="#1a1a1a"/>
    <rect x="54" y="0" width="48" height="120" fill="#FFD700"/>
    <rect x="102" y="0" width="48" height="120" fill="#E53935"/>
  </g>

  <!-- Cobblestone street / ground -->
