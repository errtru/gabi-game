      <rect x="220" y="82" width="24" height="24" rx="4"/>
      <rect x="192" y="110" width="24" height="24" rx="4"/>
      <rect x="220" y="110" width="24" height="24" rx="4"/>
      <rect x="192" y="138" width="24" height="24" rx="4"/>
      <rect x="220" y="138" width="24" height="24" rx="4"/>
    </g>
    <!-- Awning -->
