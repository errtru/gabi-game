  <!-- Atomium (Brussels landmark) -->
  <g transform="translate(600,50)">
    <!-- 9 spheres of the Atomium in characteristic arrangement -->
    <!-- Center sphere -->
    <circle cx="160" cy="260" r="55" fill="#B0BEC5" stroke="#90A4AE" stroke-width="4"/>
    <circle cx="160" cy="260" r="44" fill="#CFD8DC"/>
    <circle cx="145" cy="242" r="14" fill="white" opacity="0.4"/>
    <!-- Top sphere -->
    <circle cx="160" cy="120" r="55" fill="#B0BEC5" stroke="#90A4AE" stroke-width="4"/>
    <circle cx="160" cy="120" r="44" fill="#CFD8DC"/>
    <circle cx="145" cy="102" r="14" fill="white" opacity="0.4"/>
    <!-- Bottom sphere -->
    <circle cx="160" cy="400" r="55" fill="#B0BEC5" stroke="#90A4AE" stroke-width="4"/>
    <circle cx="160" cy="400" r="44" fill="#CFD8DC"/>
    <!-- Left sphere -->
    <circle cx="20" cy="260" r="55" fill="#B0BEC5" stroke="#90A4AE" stroke-width="4"/>
    <circle cx="20" cy="260" r="44" fill="#CFD8DC"/>
    <!-- Right sphere -->
    <circle cx="300" cy="260" r="55" fill="#B0BEC5" stroke="#90A4AE" stroke-width="4"/>
    <circle cx="300" cy="260" r="44" fill="#CFD8DC"/>
    <!-- 4 diagonal spheres -->
    <circle cx="60" cy="155" r="50" fill="#B0BEC5" stroke="#90A4AE" stroke-width="4"/>
    <circle cx="60" cy="155" r="40" fill="#CFD8DC"/>
    <circle cx="260" cy="155" r="50" fill="#B0BEC5" stroke="#90A4AE" stroke-width="4"/>
    <circle cx="260" cy="155" r="40" fill="#CFD8DC"/>
    <circle cx="60" cy="365" r="50" fill="#B0BEC5" stroke="#90A4AE" stroke-width="4"/>
    <circle cx="60" cy="365" r="40" fill="#CFD8DC"/>
    <circle cx="260" cy="365" r="50" fill="#B0BEC5" stroke="#90A4AE" stroke-width="4"/>
    <circle cx="260" cy="365" r="40" fill="#CFD8DC"/>
    <!-- Connecting tubes -->
    <line x1="160" y1="175" x2="160" y2="205" stroke="#90A4AE" stroke-width="26"/>
    <line x1="160" y1="315" x2="160" y2="345" stroke="#90A4AE" stroke-width="26"/>
    <line x1="75" y1="260" x2="105" y2="260" stroke="#90A4AE" stroke-width="26"/>
    <line x1="215" y1="260" x2="245" y2="260" stroke="#90A4AE" stroke-width="26"/>
    <line x1="94" y1="183" x2="128" y2="234" stroke="#90A4AE" stroke-width="22"/>
    <line x1="192" y1="234" x2="227" y2="183" stroke="#90A4AE" stroke-width="22"/>
    <line x1="94" y1="337" x2="128" y2="286" stroke="#90A4AE" stroke-width="22"/>
    <line x1="192" y1="286" x2="227" y2="337" stroke="#90A4AE" stroke-width="22"/>
    <!-- Shafts to ground -->
