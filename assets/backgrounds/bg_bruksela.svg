    <rect x="130" y="50" width="54" height="80" rx="6" fill="#87CEEB"/>
    <rect x="220" y="50" width="54" height="80" rx="6" fill="#87CEEB"/>
    <rect x="40" y="170" width="54" height="80" rx="6" fill="#87CEEB"/>
    <rect x="130" y="170" width="54" height="80" rx="6" fill="#87CEEB"/>
    <rect x="220" y="170" width="54" height="80" rx="6" fill="#87CEEB"/>
    <rect x="40" y="290" width="54" height="80" rx="6" fill="#87CEEB"/>
    <rect x="130" y="290" width="54" height="80" rx="6" fill="#87CEEB"/>
    <rect x="220" y="290" width="54" height="80" rx="6" fill="#87CEEB"/>
