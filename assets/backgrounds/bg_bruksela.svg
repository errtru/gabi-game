      <line x1="100" y1="0" x2="90" y2="52"/>
      <line x1="180" y1="0" x2="170" y2="52"/>
      <line x1="250" y1="0" x2="264" y2="52"/>
    </g>
  </g>

  <!-- Manneken Pis statue -->
