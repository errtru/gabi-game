    <ellipse cx="2086" cy="398" rx="40" ry="12" fill="#616161"/>
    <circle cx="2086" cy="382" r="20" fill="#FFF9C4"/>
    <circle cx="2086" cy="382" r="14" fill="#FFD600" opacity="0.8"/>
    <!-- Lamp 4 -->
    <rect x="2560" y="400" width="12" height="165" rx="6"/>
    <ellipse cx="2566" cy="398" rx="40" ry="12" fill="#616161"/>
    <circle cx="2566" cy="382" r="20" fill="#FFF9C4"/>
    <circle cx="2566" cy="382" r="14" fill="#FFD600" opacity="0.8"/>
    <!-- Lamp 5 -->
    <rect x="3080" y="400" width="12" height="165" rx="6"/>
    <ellipse cx="3086" cy="398" rx="40" ry="12" fill="#616161"/>
    <circle cx="3086" cy="382" r="20" fill="#FFF9C4"/>
    <circle cx="3086" cy="382" r="14" fill="#FFD600" opacity="0.8"/>
