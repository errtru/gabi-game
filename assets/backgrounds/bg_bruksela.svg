  <circle cx="3600" cy="100" r="55" fill="#FFEA00" opacity="0.8"/>

  <!-- Clouds -->
  <g opacity="0.8">
    <ellipse cx="400" cy="80" rx="100" ry="38" fill="white"/>
    <ellipse cx="350" cy="90" rx="70" ry="34" fill="white"/>
    <ellipse cx="470" cy="92" rx="80" ry="30" fill="white"/>
  </g>
  <g opacity="0.8">
