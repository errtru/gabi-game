      <rect x="102" y="30" width="60" height="80" rx="5"/>
      <rect x="180" y="30" width="60" height="80" rx="5"/>
      <rect x="258" y="30" width="60" height="80" rx="5"/>
      <rect x="24" y="140" width="60" height="80" rx="5"/>
      <rect x="102" y="140" width="60" height="80" rx="5"/>
      <rect x="180" y="140" width="60" height="80" rx="5"/>
      <rect x="258" y="140" width="60" height="80" rx="5"/>
      <rect x="24" y="250" width="60" height="80" rx="5"/>
      <rect x="258" y="250" width="60" height="80" rx="5"/>
    </g>
    <!-- Grand door -->
